<section class="top-sec">

        <img src="../Homework_3/assets/image/other/IMG_3168.jpg"
            alt="profile-img" class="profile-img">
        <div class="text-container">
            <h1>Hey! I'm Quoc Bao!</h1>
            <p>Computer Science at Kent State University</p>
        </div>
    </div>
</section>

<div class="resume-section">
    <h2>Resume Here</h2>
    <div class="button-group">
        <a href="../Homework_3/assets/file/my resume.pdf" download>
            <button class="btn-download">Download</button>
        </a>
        <button class="btn btn-outline-danger" data-bs-toggle="modal"
            data-bs-target="#resumeModal">Quick Look</button>
    </div>

<div class="modal fade" id="resumeModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Resume Preview</h5>
                <button type="button" class="btn-close"
                    data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="height: 80vh;">
                <iframe src="../Homework_3/assets/file/my resume.pdf"
                    width="100%" height="100%"
                    style="border: none;"></iframe>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary"
                    data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
