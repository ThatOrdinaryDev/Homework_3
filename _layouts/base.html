<head>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

<body class="d-flex flex-column min-vh-100">

                aria-expanded="false" aria-label="Toggle navigation">
                <span class="toggler-icon top-bar"></span>
                <span class="toggler-icon middle-bar"></span>
                <span class="toggler-icon bottom-bar"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link" href="/Homework_3/">Home</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link"
                                href="/Homework_3/about/">About</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link"
                                href="/Homework_3/projects/">Projects</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link"
                                href="/Homework_3/blog/">Blog</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link"
                                href="/Homework_3/contact/">Contact</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <div class="holographic-card">
                            <a class="nav-link" href="#" data-bs-toggle="modal"
                                data-bs-target="#passForm">
                                Archive
                            </a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="modal fade" id="passForm" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-black text-white rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title" id="passFormLabel">Nuh Uh! This is
                        not for public. Password please!</h5>
                    <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="passForm" id="passwordForm">
                        <div class="mb-3">
                            <label for="passwordInput"
                                class="form-label">Password</label>
                            <input type="password" class="form-control"
                                id="passwordInput"
                                placeholder="I guess we never know..." required>
                        </div>
                        <button type="submit" class="btn magnetic w-100">
                            <span>Check</span>
                            <div class="particles-field"
                                id="particleField"></div>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <hr class="space-divider">
    <hr class="space-divider">
    <main class="content-container my-4 flex-grow-1">
        {{ content }}
    </main>
    <footer class="bg-dark text-light py-4 mt-auto">
        <div class="footer-container text-center">
            <p class="contact-me-line">Contact me via</p>
            <ul class="footer-icon-social">

                <li> <a href="https://x.com/IamNOONEXDD" target="_blank">

                    </a></li>
                <li> <a href="https://discord.com/users/m_m_idk123"
                        target="_blank">
                        <i class="fab fa-discord"
                            style="--accent-color: #7289DA;"></i>
                    </a> </li>
                <li> <a
                        href="https://www.facebook.com/profile.php?id=61550888168516"
                        target="_blank">
                        <i class="fab fa-facebook"
                            style="--accent-color: #3b5998;"></i>
                    </a> </li>
                <li> <a
                        href="https://www.linkedin.com/in/quoc-bao-dang-4ba8123b5/"
                        target="_blank">
                        <i class="fab fa-linkedin"
                            style="--accent-color: #915907;"></i>
                    </a> </li>
            </ul>
            <div class="footer-divider"></div>
            <p class="mb-2">© <script>
          document.write(new Date().getFullYear())
        </script> Quoc Bao Dang. All rights reserved.</p>
        </div>
    </footer>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        defer></script>
    <script src="{{ '/js/stickyNavbar.js' | relative_url }}"></script>
    <script src="{{ '/js/secretPassword.js' | relative_url }}"></script>
